body:
  text: 各整威儀咸生䖍敬志心朝禮運念誦持柲宻琅函玄微瓊藏當願天恩普度地獄咸開慧日照臨慈光攝受志心朝禮運念誦持三寳靈文九清聖範當願大施利濟遍及隂𡨋度品南宮化生北府志心朝禮運念誦持十洞真詮萬天仙梵當願靈慈拯拔玄化敷弘應處幽塗悉沾殊勝以今將修玉籍特蕆金科至聖啓途衆真浮駕遂使九幽交㑹五苦咸聽迴向奉行讃詠如法爾時元始天尊在九清妙境三元寳宫御劫刄臺中集騫木林下與太上道君太上老君諸天衆聖三界尊神九府三官四司五帝察命童子妙行真人一時同至皆駕八景琅輿五色瓊輦麟馭羽騎鳳葆龍旗吟誦洞章朝賛玉座於是元始天尊軫大慈悲放諸光明輝映九幽地獄開通一切㝠司羅酆衆曰今日何縁億劫所感恒居黒暗克賴照臨元始天尊敕命北都大帝五帝考官六宫掾吏牛頭鬼卒虎眼神王三界大魔九幽羣𩲸有諸六宮校集九府死生一十二之河源二十四之狴犴南水㑹宮之府北海長夜之庭遂得大軫天慈廣開聖道顯說九真之妙戒當資五業之幽塗志誠纔起於焚修玄感必彰於顯應仰賴玄元之化咸歸拯拔之門稽首歸依䖍誠懴悔東方有諸罪人處風雷之獄霹靂之牢劒樹刀山飛戈飄㦸穿穴五藏分解四肢常處狴犴不捨晝夜謹當資薦願遂往生志心歸命清都闡教天尊志心歸命紫府垂慈天尊志心歸命乾坤開度天尊志心歸命日月照臨天尊志心歸命穹崇聖㮣天尊志心歸命廣大玄功天尊志心歸命轉輪自在天尊志心歸命受錬更生天尊志心歸命超凌上境天尊志心歸命逍遥太虚天尊稽首歸依䖍誠懴悔南方有諸罪人處烽輪之獄欠山之牢烈焱燎頭猛𤔵燒面骸骨灰粉皮膚焦熬常處狴犴不捨晝夜謹當資薦願遂往生志心歸命玄穹垂化天尊志心歸命至聖覃恩天尊志心歸命慈悲五苦天尊志心歸命愍念三塗天尊志心歸命沈𡨚罷對天尊志心歸命滯䰟超生天尊志心歸命消滅惡趣天尊志心歸命資益善縁天尊志心歸命沖昇寳洞天尊志心歸命飛陟朱陵天尊稽首歸依䖍誠懴悔西方有諸罪人處金剛之獄鐵圍之牢金鎚塞心鐵棒穿腹骨肉爛壞肢節分離常處狴犴不捨晝夜謹當資薦願遂往生志心歸命咸承慧日天尊志心歸命普度真風天尊志心歸命玄慈拯濟天尊志心歸命聖力開通天尊志心歸命蠲除罪釁天尊志心歸命懴拔湮沈天尊志心歸命五道變跡天尊志心歸命十轉迴靈天尊志心歸命隨處應化天尊志心歸命所在生仙天尊稽首歸依䖍誠㰇悔北方有諸罪人處溟冷之獄沈没之牢寒丘冰池雪㦸霜刄臭屍破壞毒汁澆淋常處狴犴不捨晝夜謹當資薦願遂往生志心歸命不盡道力天尊志心歸命無極玄通天尊志心歸命落除罪業天尊志心歸命拔贖沈淪天尊志心歸命刀山斷刄天尊志心歸命劒樹摧鋒天尊志心歸命飛度五戸天尊志心歸命超轉八門天尊志心歸命化生紫極天尊志心歸命沖寂碧穹天尊稽首歸依䖍誠懴悔東北方有諸罪人處鑊湯之獄鑪炭之牢煑潰四肢烹離六府筋骨臭穢膿血消洋常處狴犴不捨晝夜謹當資薦願遂往生志心歸命斷除障礙天尊志心歸命消滅𡨚仇天尊志心歸命煙牢息焰天尊志心歸命火獄沈光天尊志心歸命迴骸得度天尊志心歸命錬質受生天尊志心歸命咸登福海天尊志心歸命廣布法橋天尊志心歸命神昇閬苑天尊志心歸命䰟陟梵天天尊稽首歸依䖍誠懴悔東南方有諸罪人處銅柱之獄鐵牀之牢手抱足登腹焦背爛膿血潰滴煙火燒焚常處狴犴不捨晝夜謹當資薦願遂往生志心歸命上垂睿化天尊志心歸命普度洪慈天尊志心歸命太玄起死天尊志心歸命寳籍生神天尊志心歸命能蠲業道天尊志心歸命得脫苦輪天尊志心歸命飛昇慾海天尊志心歸命離超愛河天尊志心歸命逍遥真境天尊志心歸命騰翥仙闕天尊稽首歸依䖍誠懴悔西南方有諸罪人處屠割之獄倒懸之牢五藏皮膚四肢筋脉隨手刀剌滿地血流常處狴犴不捨晝夜謹當資薦願遂往生志心歸命天垂開度天尊志心歸命身得上生天尊志心歸命普施法雨天尊志心歸命宻布慈雲天尊志心歸命潜超苦海天尊志心歸命遽脫灰河天尊志心歸命龍城化跡天尊志心歸命鳳闕登仙天尊志心歸命永離煩惱天尊志心歸命感果逍遥天尊稽首歸依䖍誠懴悔西北方有諸罪人處火車之獄煙刄之牢輪轉東西支分四大悉縈灰炭遍受煎熬常處狴犴不捨晝夜謹當資薦願遂往生志心歸命圓穹及物天尊志心歸命上天度人天尊志心歸命開度幽暗天尊志心歸命蕩滌瑕疵天尊志心歸命應念得力天尊志心歸命隨念合真天尊志心歸命消除罪跡天尊志心歸命落滅惡根天尊志心歸命悉生樂境天尊志心歸命咸慶仙郷天尊稽首歸依䖍誠懴悔中央有諸罪人處普掠之獄受栲之牢劒樹斷筋刀山流血足落斧刄身掛劒楞常處狴犴不捨晝夜謹當資薦願遂往生志心歸命玄恩普及天尊志心歸命法力無窮天尊志心歸命神功拯物天尊志心歸命仙化成人天尊志心歸命宿命合道天尊志心歸命死䰟生身天尊志心歸命盪除愆釁天尊志心歸命懴滌縈纏天尊志心歸命潜消業障天尊志心歸命永離幽冥天尊稽首歸依䖍誠懴悔二千六百里之酆都八萬四千重之鬼獄茫茫苦海翻雪浪之千尋渺渺灰河鼓煙波之萬狀無樹不攅於霜刄有山皆列於風刀永無追薦之縁堪歎沈淪之道遂則仰憑寳炷特演真詮宣聖號則溥應十方掲梵音則遥騰三界當願上垂隂德下及幽䰟謹當精念道場懴除地獄刀山劒樹脫落地獄鑊湯鑪炭燒煑地獄鐵牀銅柱焦然地獄刀輪火車霹靂地獄拔舌耕犂楚痛地獄釘身鋸解斷截地獄鐵網肢節分離地獄火坑炮炙猛烈地獄刀兵爪距摶撮地獄虎狼鷹犬殘害地獄吞噉鐵九消爛地獄暗㝠肉山斬剉地獄洋銅飲鐵爛潰地獄鹹水寒冰坼裂地獄大鐵圍山門地獄小鐵圍山門地獄鐵馬鐵牛地獄鐵驢鐵鳥地獄鐵山鐵屋地獄鐵車鐵衣地獄飛刀掣電地獄解身爪頭地獄八寒八極地獄兩舌兩石地獄然手燒脚地獄剥皮飲血地獄糞尿地獄鱠肉地獄𨪏鏫地獄崩埋地獄阿波波地獄阿婆婆地獄阿吒吒地獄阿羅羅地獄如是焦熬猛焰凛冽寒冰不以懴揚難蠲罪業遂乃用依科教俯伏道縁啓今晨香火之功爲曩劫河源之苦拯昏㝠於九夜拔楚痛於八門念岱嶽之悲哀闢酆都之壅滯覬期睿力獲沐靈慈以今運心謹當作禮志心歸命蠲消宿業天尊志心歸命超拔沈䰟天尊志心歸命斷滅三惡天尊志心歸命出陟九幽天尊志心歸命蓬萊化跡天尊志心歸命崑閬飛身天尊志心歸命沖昇鼇島天尊志心歸命縁㑹麟洲天尊志心歸命無所不度天尊志心歸命有念皆通天尊志心歸命大慈大悲救苦真人志心歸命大慈大悲拔難真人志心歸命大慈大悲滅罪真人志心歸命大慈大悲度厄真人復懴諸大地獄諸大鬼牢七重鐵城七重鐵網有牛頭獄卒六十二眼而八頭一十八角而九尾手中執其鐵㦸目中放其鐵丸罪人從頂而穿從足而出痛連骨髓苦切心肝求生不生求死不死石磨而輪迴歷劫鐵碓而上下無時煙火交飛鳥獸擊摶悉是惡道所感皆由宿業所招不覩三光不識三寳於是元始天尊告曰若能繕寫斯經葆稱其㫖靜念而建壇立像志心而行道散花當遣金剛神王天丁力士三界五帝一切衆靈大布慈悲廣臻福祉迴骸起死錬質成真慈光俯鑒於有情玄造遍施於無礙瓊鐘扣處盡開利濟之門玉磬鏘時悉導宣揚之路賴其九清妙範託乎十洞真詮冰庭而變作瑶池火屋而化爲寳地鋒摧劒樹刃斷刀山當令長夜之沈淪盡遂今朝之解脫收經聞經得道隨念往生無盡玄功無邊睿愛復願解分宿對縁㑹當來所墮三塗悉蠲八難聞經得道隨念往生無量洪因無涯聖㮣復願潜停輪轉永斷牽纏惡趣騰輝死䰟受錬聞經得道隨念往生無極良因無窮妙力復願四司無滯九署潜通䰟度朱陵神遊紫府以今懴揚巳蕆禮念將周各擁慈雲同超淨域遂得霓幢接歩羽駕來儀飛陟太虚逍遥極樂歎經詳夫上品玄科中天寳藏列鳳篆龍章之跡綴飛雲垂露之文功乃變通力能昇進是故因經所以明道因道所以立經苟無敷誦之勤焉解縈纏之道受罪之含齒被髮衘𡨚之挿羽披毛莫不水火風刀輪迴生死㑹翕張於隂府當拷訊於玄司是用薦資將伸懴拔伏惟侍香金媛典經玉郎上啓八門下通五戶演死䰟生身之仙品騰神公受命之靈音能令歸向者開泰仙都諦聽者超凌惡趣息愛河之波浪設苦海之舟航廣布法橋俱躋道岸速奉霓旌羽節常陪鶴馭鸞輿徘徊於七寳經臺娱樂於三清洞闕九華韻萬石聲和既荷玄慈咸歸妙道謹值朝修之際得以香火之餘伏爲上代祖宗未能遷適近亡姻眷尚在幽㝠乞使抹破罪書掃除惡跡遂果韓司拯度獲承酆都開通齊朝極樂之天各㑹往生之府竊念臣等所造麤心惡跡致渉因依凡貪爽口肆情有傷物命爲生前之結釁當命盡之報身不修懴贖之門難解縈仍之路衘𡨚負債悉覬逍遥羽族毛羣咸蒙通變懴滌有感昭之力身口無挂礙之虞恭惟金闕慈尊玉京上聖廣開愍惻特納䖍祈俾令返朴之時無經八障還淳之旦不歷三塗九景臺前乗風御氣五明宫内㑹道合真白簡上生三十二天之赤書受命黄籙削死百二十曹之黒籍勾名巳往沾恩見存獲慶建一百紫虚之聖號應萬重丹漢之宸聦鈿軸啓時更助修持之力靈文誦處當伸朝禮之心寳香不斷於二時慧炬常然於午夜無盡妙善無量勝因大啓歸依廣伸懴悔太上消滅地獄昇陟天堂懴
